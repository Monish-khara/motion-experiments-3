<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Tree — 3D Hue Cycle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const SIZE = 800;
    canvas.width = SIZE;
    canvas.height = SIZE;

    const PX = 4;
    const HUE_SPEED = 0.55;
    const DEPTH_HUE = 20;
    const ROT_SPEED = 0.008;
    const CAM_DIST = 1100;
    const FOV = 870;
    const MORPH_DURATION = 180;
    const HOLD_DURATION = 300;
    const CYCLE = MORPH_DURATION + HOLD_DURATION;

    function makeRng(seed) {
      let s = seed;
      return () => { s = (s * 16807) % 2147483647; return s / 2147483647; };
    }

    function n3(v) {
      const l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);
      return l > 0 ? [v[0]/l,v[1]/l,v[2]/l] : [0,-1,0];
    }

    function cross(a,b) {
      return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
    }

    function deflect(dir, spread, az) {
      const up = Math.abs(dir[1]) < 0.95 ? [0,-1,0] : [1,0,0];
      const r = n3(cross(dir, up));
      const f = n3(cross(r, dir));
      const sa=Math.sin(spread), ca=Math.cos(spread);
      const saz=Math.sin(az), caz=Math.cos(az);
      return n3([
        dir[0]*ca + r[0]*sa*caz + f[0]*sa*saz,
        dir[1]*ca + r[1]*sa*caz + f[1]*sa*saz,
        dir[2]*ca + r[2]*sa*caz + f[2]*sa*saz
      ]);
    }

    const shapes = [
      {
        name: 'oak',
        seed: 42, N: 8, L: 135, trunkH: 80,
        elev: [-0.4, 0.25], horiz: [0.8, 0.15],
        spread: 0.4, shrink: [0.56, 0.14], flat: 0.07,
        thick: 1.0, droop: 0, maxD: 10,
        leafSize: 3.0, leafDepth: 6, leafCount: 8
      },
      {
        name: 'willow',
        seed: 137, N: 7, L: 120, trunkH: 95,
        elev: [-0.35, 0.15], horiz: [0.82, 0.1],
        spread: 0.3, shrink: [0.65, 0.08], flat: 0.04,
        thick: 0.7, droop: 0.07, maxD: 12,
        leafSize: 1.0, leafDepth: 8, leafCount: 3
      },
      {
        name: 'baobab',
        seed: 271, N: 5, L: 85, trunkH: 110,
        elev: [-0.5, 0.3], horiz: [0.7, 0.2],
        spread: 0.55, shrink: [0.48, 0.16], flat: 0.03,
        thick: 2.8, droop: 0, maxD: 6,
        leafSize: 5.0, leafDepth: 3, leafCount: 12
      },
      {
        name: 'pine',
        seed: 503, N: 16, L: 65, trunkH: 45,
        elev: [-0.65, 0.12], horiz: [0.5, 0.12],
        spread: 0.65, shrink: [0.42, 0.18], flat: 0.01,
        thick: 0.4, droop: 0.015, maxD: 7,
        leafSize: 1.5, leafDepth: 4, leafCount: 5
      },
      {
        name: 'cherry',
        seed: 719, N: 6, L: 110, trunkH: 85,
        elev: [-0.32, 0.18], horiz: [0.85, 0.1],
        spread: 0.35, shrink: [0.58, 0.12], flat: 0.09,
        thick: 0.8, droop: 0.025, maxD: 10,
        leafSize: 4.0, leafDepth: 5, leafCount: 14
      },
      {
        name: 'bonsai',
        seed: 997, N: 4, L: 140, trunkH: 65,
        elev: [-0.18, 0.1], horiz: [0.94, 0.04],
        spread: 0.22, shrink: [0.6, 0.1], flat: 0.16,
        thick: 2.0, droop: 0.01, maxD: 8,
        leafSize: 4.5, leafDepth: 4, leafCount: 10
      },
    ];

    const NUM_SHAPES = shapes.length;

    function buildTree(cfg) {
      const rng = makeRng(cfg.seed);
      const segs = [];

      const trunkThick = cfg.thick * 3;
      segs.push({p1:[0,0,0], p2:[-8,-cfg.trunkH,5], d:0, th:trunkThick, lf:0});
      segs.push({p1:[0,0,0], p2:[8,-cfg.trunkH,-5], d:0, th:trunkThick, lf:0});

      const top = [0,-cfg.trunkH,0];

      for (let i = 0; i < cfg.N; i++) {
        const az = (i / cfg.N) * Math.PI * 2 + rng() * 0.3;
        const elev = cfg.elev[0] - rng() * cfg.elev[1];
        const horiz = cfg.horiz[0] + rng() * cfg.horiz[1];
        const dir = n3([Math.cos(az)*horiz, elev, Math.sin(az)*horiz]);
        const len = cfg.L * (0.9 + rng() * 0.2);
        grow(segs, rng, cfg, top, dir, len, 1);
      }

      return segs;
    }

    function grow(segs, rng, cfg, o, dir, len, d) {
      if (d > cfg.maxD || len < 3) return;

      const droopAmt = cfg.droop * d * d;
      const drooped = n3([dir[0], dir[1] + droopAmt, dir[2]]);

      const e = [o[0]+drooped[0]*len, o[1]+drooped[1]*len, o[2]+drooped[2]*len];

      const thickFalloff = Math.pow(0.7, d);
      const th = cfg.thick * thickFalloff;

      const isLeafZone = d >= cfg.leafDepth;
      const leafAmount = isLeafZone ? cfg.leafSize * (1 - (d - cfg.leafDepth) / (cfg.maxD - cfg.leafDepth + 1)) : 0;

      segs.push({p1:[...o], p2:[...e], d, th, lf: leafAmount});

      if (isLeafZone) {
        const nLeaves = Math.ceil(cfg.leafCount * (0.5 + 0.5 * rng()));
        const leafR = len * 0.4;
        for (let j = 0; j < nLeaves; j++) {
          const t = rng();
          const bx = o[0] + (e[0]-o[0])*t;
          const by = o[1] + (e[1]-o[1])*t;
          const bz = o[2] + (e[2]-o[2])*t;
          const ox = (rng()-0.5) * leafR * 2;
          const oy = (rng()-0.5) * leafR * 1.5;
          const oz = (rng()-0.5) * leafR * 2;
          const lp = [bx+ox, by+oy, bz+oz];
          segs.push({p1:[...lp], p2:[lp[0]+(rng()-0.5)*4, lp[1]+(rng()-0.5)*4, lp[2]+(rng()-0.5)*4], d: d+1, th: 0, lf: leafAmount * 1.2});
        }
      }

      const sh = cfg.shrink[0] + rng() * cfg.shrink[1];
      const nl = len * sh;

      const flat = Math.min(d * cfg.flat, 0.4);
      const fd = n3([drooped[0]*(1+flat), drooped[1]*(1-flat*0.6), drooped[2]*(1+flat)]);

      const nk = d < 4 ? 2 + (rng()<0.35?1:0) : 2;

      for (let i = 0; i < nk; i++) {
        const sp = cfg.spread * (0.7 + rng()*0.6);
        const az = (i/nk)*Math.PI*2 + rng()*Math.PI*0.9;
        grow(segs, rng, cfg, e, deflect(fd, sp, az), nl, d+1);
      }
    }

    const rawTrees = shapes.map(s => buildTree(s));

    function sortByDepth(segs) {
      return [...segs].sort((a,b) => a.d - b.d);
    }

    const sortedTrees = rawTrees.map(t => sortByDepth(t));
    const maxSegs = Math.max(...sortedTrees.map(t => t.length));

    const trees = sortedTrees.map(t => {
      const padded = [...t];
      while (padded.length < maxSegs) {
        const src = padded[padded.length - 1];
        padded.push({ p1:[...src.p2], p2:[...src.p2], d: src.d, th: 0, lf: 0 });
      }
      return padded;
    });

    function smoothstep(t) {
      return t * t * (3 - 2 * t);
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function lerp3(a, b, t) {
      return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
    }

    function rotY(p, a) {
      const c=Math.cos(a), s=Math.sin(a);
      return [p[0]*c+p[2]*s, p[1], -p[0]*s+p[2]*c];
    }

    function proj(p) {
      const z = p[2]+CAM_DIST;
      const sc = FOV/z;
      return [SIZE/2+p[0]*sc, SIZE*0.65+p[1]*sc, z];
    }

    function pxLine(x1,y1,x2,y2,col,thick) {
      const dx=x2-x1, dy=y2-y1;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const st=Math.max(Math.ceil(dist/PX),1);
      const sz = Math.max(PX, Math.round(PX * thick));
      ctx.fillStyle=col;
      for(let i=0;i<=st;i++){
        const t=i/st;
        const px=Math.round((x1+dx*t)/PX)*PX;
        const py=Math.round((y1+dy*t)/PX)*PX;
        ctx.fillRect(px,py,sz,sz);
      }
    }

    function pxBlob(x, y, col, size) {
      const sz = Math.max(PX, Math.round(PX * size));
      const half = Math.floor(sz / (2 * PX));
      ctx.fillStyle = col;
      for (let dy = -half; dy <= half; dy++) {
        for (let dx = -half; dx <= half; dx++) {
          const px = Math.round(x / PX) * PX + dx * PX;
          const py = Math.round(y / PX) * PX + dy * PX;
          ctx.fillRect(px, py, PX, PX);
        }
      }
    }

    function hsl(h,s,l) {
      h=((h%360)+360)%360; s/=100; l/=100;
      const c=(1-Math.abs(2*l-1))*s;
      const x=c*(1-Math.abs((h/60)%2-1));
      const m=l-c/2;
      let r,g,b;
      if(h<60){r=c;g=x;b=0}
      else if(h<120){r=x;g=c;b=0}
      else if(h<180){r=0;g=c;b=x}
      else if(h<240){r=0;g=x;b=c}
      else if(h<300){r=x;g=0;b=c}
      else{r=c;g=0;b=x}
      return`rgb(${Math.round((r+m)*255)},${Math.round((g+m)*255)},${Math.round((b+m)*255)})`;
    }

    let hueBase=0, frame=0;

    function draw() {
      frame++;
      ctx.fillStyle='#000';
      ctx.fillRect(0,0,SIZE,SIZE);

      const totalFrame = frame % (CYCLE * NUM_SHAPES);
      const shapeIdx = Math.floor(totalFrame / CYCLE);
      const withinCycle = totalFrame % CYCLE;

      const fromTree = trees[shapeIdx];
      const toTree = trees[(shapeIdx + 1) % NUM_SHAPES];

      let t;
      if (withinCycle < HOLD_DURATION) {
        t = 0;
      } else {
        t = smoothstep((withinCycle - HOLD_DURATION) / MORPH_DURATION);
      }

      const ang = frame * ROT_SPEED;
      const pr = [];

      for (let i = 0; i < maxSegs; i++) {
        const sA = fromTree[i], sB = toTree[i];
        const p1 = lerp3(sA.p1, sB.p1, t);
        const p2 = lerp3(sA.p2, sB.p2, t);
        const th = lerp(sA.th, sB.th, t);
        const lf = lerp(sA.lf, sB.lf, t);
        const d = sA.d;

        const r1=rotY(p1,ang), r2=rotY(p2,ang);
        const pp1=proj(r1), pp2=proj(r2);
        pr.push({x1:pp1[0],y1:pp1[1],x2:pp2[0],y2:pp2[1],z:(pp1[2]+pp2[2])/2,d,th,lf});
      }

      pr.sort((a,b)=>a.z-b.z);

      for (const s of pr) {
        if (s.th < 0.01 && s.lf < 0.01) continue;
        const h = hueBase + s.d * DEPTH_HUE;
        const l = 50 + (s.d>8?5:0);
        const col = hsl(h,100,l);

        if (s.lf > 0.5) {
          pxBlob(
            (s.x1+s.x2)/2,
            (s.y1+s.y2)/2,
            col, s.lf
          );
        }
        if (s.th > 0.01) {
          pxLine(s.x1,s.y1,s.x2,s.y2,col,s.th);
        }
      }

      hueBase += HUE_SPEED;
      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
